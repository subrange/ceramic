name: Build

on:
  push:
    branches: [main, llvm-3.2-to-latest]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-19 llvm-19-dev clang-19 python3 ninja-build cmake

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19

      - name: Build
        run: cmake --build build

      - name: Test
        run: cmake --build build --target test

  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-19

      - name: Check formatting
        run: |
          find compiler tools -name '*.cpp' -o -name '*.hpp' \
            | xargs clang-format-19 --dry-run --Werror
