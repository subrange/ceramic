name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-19 llvm-19-dev clang-19 \
            ninja-build cmake python3 \
            zlib1g-dev libxml2-dev libzstd-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCERAMIC_STATIC_LLVM=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"

      - name: Build
        run: cmake --build build

      - name: Stage release tree
        run: |
          tag="${GITHUB_REF_NAME}"
          name="ceramic-${tag}-linux-x86_64"
          mkdir -p "dist/${name}/bin"
          cp build/compiler/ceramic "dist/${name}/bin/"
          cp -r lib-ceramic "dist/${name}/"
          cp LICENSE LICENSE.txt README.md "dist/${name}/" 2>/dev/null || true
          echo "ARCHIVE_NAME=${name}" >> "$GITHUB_ENV"

      - name: Archive
        run: |
          cd dist
          tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.ARCHIVE_NAME }}.tar.gz
            dist/${{ env.ARCHIVE_NAME }}.tar.gz.sha256
          draft: true
          generate_release_notes: true
